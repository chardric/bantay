services:
  beszel:
    image: 'henrygd/beszel'
    container_name: 'beszel'
    restart: unless-stopped
    ports:
      - '8090:8090'
    volumes:
      - ./bantay_data:/bantay_data
    extra_hosts:
      - 'host.docker.internal:host-gateway'

  bantay-agent:
    image: 'henrygd/bantay-agent' #Add -nvidia for nvidia gpus
    container_name: 'bantay-agent'
    restart: unless-stopped
    network_mode: host
    # runtime: nvidia # when using bantay-agent-nvidia
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      PORT: 45876
      KEY: '...'
      # FILESYSTEM: /dev/sda1 # set to the correct filesystem for disk I/O stats
      # NVIDIA_VISIBLE_DEVICES: all # when using bantay-agent-nvidia
      # NVIDIA_DRIVER_CAPABILITIES: utility # when using bantay-agent-nvidia
